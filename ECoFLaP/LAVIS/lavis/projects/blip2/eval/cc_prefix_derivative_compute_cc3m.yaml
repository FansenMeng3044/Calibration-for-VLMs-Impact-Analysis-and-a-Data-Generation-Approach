# =============================================================================
# 【原配置 / 旧】CC3M calibration 剪枝用
# 文件名标注: cc_prefix_derivative_compute_cc3m.yaml
# 用途: 使用 Conceptual Caption 3M 的 train 作为 calibration 数据做剪枝
