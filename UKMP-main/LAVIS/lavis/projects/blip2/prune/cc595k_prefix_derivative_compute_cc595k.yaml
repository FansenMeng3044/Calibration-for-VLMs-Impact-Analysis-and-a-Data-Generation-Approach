# =============================================================================
# 【原配置 / 旧】UKMP 剪枝用 CC595k calibration
# 文件名标注: cc595k_prefix_derivative_compute_cc595k.yaml
# 用途: 使用 Conceptual Caption 595k 的 train 作为 calibration 数据
