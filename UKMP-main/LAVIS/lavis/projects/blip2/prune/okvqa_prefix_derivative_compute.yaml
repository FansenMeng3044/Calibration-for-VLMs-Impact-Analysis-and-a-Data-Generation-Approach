# =============================================================================
# 【OK-VQA calibration 配置】带文件名标注的副本: cc595k_prefix_derivative_compute_okvqa.yaml
# 当前若用 OK-VQA calibration 剪枝，请 --cfg-path 指向 cc595k_prefix_derivative_compute_okvqa.yaml
# =============================================================================
# UKMP 剪枝用 OK-VQA calibration（与 ECoFLaP 同逻辑，换 calibration 数据）
# 数据路径在 lavis/configs/datasets/okvqa/calibration.yaml 里改
model:
  arch: blip2_t5
  model_type: pretrain_flant5xl
  use_grad_checkpoint: False

datasets:
  prefix_okvqa_calibration:
    vis_processor:
        train:
          name: "blip2_image_train"
          image_size: 224
    text_processor:
        train:
          name: "blip_question"

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 5e-5
  min_lr: 2.5e-6
  warmup_lr: 5e-7
  weight_decay: 0.05
  max_epoch: 1
  batch_size_train: 40
  batch_size_eval: 40
  num_workers: 4
  warmup_steps: 50
  seed: 42
  output_dir: "output/BLIP2/OKVQA_calibration"
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  test_splits: ["train"]
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
