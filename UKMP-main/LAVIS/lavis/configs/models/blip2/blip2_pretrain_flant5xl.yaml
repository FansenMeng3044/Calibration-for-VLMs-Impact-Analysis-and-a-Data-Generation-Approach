model:
  arch: pretrain_flant5xl
  load_finetuned: False

  # pretrained: 原本地占位路径；新：用 URL，复用 ECoFLaP 已下载的 blip2_pretrained_flant5xl.pth
  # pretrained: "/{dir_path}/models/blip2/blip2_pretrained_flant5xl.pth"
  pretrained: "https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/BLIP2/blip2_pretrained_flant5xl.pth"
  finetuned: ""

  # vit encoder
  image_size: 224
  drop_path_rate: 0
  use_grad_checkpoint: False
  vit_precision: "fp16"
  freeze_vit: True

  # Q-Former
  num_query_token: 32

  # T5: 原本地路径；新：HF 模型 ID，复用 ~/.cache/huggingface 中的 flan-t5-xl
  # t5_model: "/{dir_path}/models/google/flan-t5-xl"
  t5_model: "google/flan-t5-xl"

  # generation configs
  prompt: ""


preprocess:
    vis_processor:
        train:
          name: "blip_image_train"
          image_size: 224
        eval:
          name: "blip_image_eval"
          image_size: 224
    text_processor:
        train:
          name: "blip_caption"
        eval:
          name: "blip_caption"
